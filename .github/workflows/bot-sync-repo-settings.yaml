name: Bot > Sync Repo Settings

run-name: >-
  ${{ github.workflow }} > ${{ github.event.client_payload.repository }}

on:
  repository_dispatch:
    types:
      - repository.created
      - schedule.weekly
      - sync-repo-settings

env:
  FORCE_COLOR: 1
  OWNER: ${{ github.event.client_payload.owner }}
  REPO: ${{ github.event.client_payload.repo }}
  REPOSITORY: ${{ github.event.client_payload.repository }}

concurrency:
  group: >-
    ${{ github.workflow }} > ${{ github.event.client_payload.repository }}
  cancel-in-progress: false

jobs:
  actions:
    name: Actions
    runs-on: ubuntu-latest
    steps:
      - name: Set Default Workflow Permissions
        # ref: <https://docs.github.com/en/rest/actions/permissions?apiVersion=2026-03-10#set-default-workflow-permissions-for-a-repository>
        # "Administration" repository permissions (write)
        # Note: `can_approve_pull_request_reviews` grants permission to create pull requests and submit approving reviews; set to `true` to enable GitHub Actions to create pull requests.
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/actions/permissions/workflow'
          --field default_workflow_permissions='read'
          --field can_approve_pull_request_reviews=true
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-copier:
    name: Environment > Copier
    environment:
      name: Copier
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: Copier
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set App ID
        run: >-
          gh variable set APP_ID
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ vars.APP_ID }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set Private Key
        run: >-
          gh secret set PRIVATE_KEY
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ secrets.PRIVATE_KEY }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-mega-linter:
    name: Environment > MegaLinter
    environment:
      name: MegaLinter
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: MegaLinter
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set App ID
        run: >-
          gh variable set APP_ID
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ vars.APP_ID }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set Private Key
        run: >-
          gh secret set PRIVATE_KEY
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ secrets.PRIVATE_KEY }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-npm:
    name: Environment > npm
    environment:
      name: npm
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: npm
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-pypi:
    name: Environment > PyPI
    environment:
      name: PyPI
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: PyPI
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-release-please:
    name: Environment > Release Please
    environment:
      name: Release Please
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: Release Please
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set App ID
        run: >-
          gh variable set APP_ID
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ vars.APP_ID }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set Private Key
        run: >-
          gh secret set PRIVATE_KEY
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ secrets.PRIVATE_KEY }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  env-reviewdog:
    name: Environment > reviewdog
    environment:
      name: reviewdog
      deployment: false
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: reviewdog
    steps:
      - name: Create Environment
        # ref: <https://docs.github.com/en/rest/deployments/environments?apiVersion=2026-03-10#create-or-update-an-environment>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/environments/${{ env.ENVIRONMENT_NAME }}'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set App ID
        run: >-
          gh variable set APP_ID
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ vars.APP_ID }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Set Private Key
        run: >-
          gh secret set PRIVATE_KEY
          --env '${{ env.ENVIRONMENT_NAME }}'
          --body '${{ secrets.PRIVATE_KEY }}'
          --repo '${{ env.REPOSITORY }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  gh-pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Setup GitHub Pages
        uses: liblaf/actions/setup-pages@v1
        with:
          repository: ${{ env.REPOSITORY }}
          token: ${{ secrets.GH_PAT }}

  immutable-releases:
    name: Enable immutable releases
    runs-on: ubuntu-latest
    steps:
      - name: Enable immutable releases
        # ref: <https://docs.github.com/en/rest/repos/repos?apiVersion=2026-03-10#enable-immutable-releases>
        # "Administration" repository permissions (write)
        run: >-
          gh api '/repos/${{ env.REPOSITORY }}/immutable-releases'
          --method PUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  label:
    name: Label
    runs-on: ubuntu-latest
    steps:
      # TODO: remove download labels until <https://github.com/Financial-Times/github-label-sync/issues/193> is resolved
      - name: Download Labels
        run: >-
          wget --output-document='labels.yaml'
          'https://raw.githubusercontent.com/${{ env.OWNER }}/.github/main/.github/labels.yaml'
      - name: GitHub Label Sync
        run: >-
          npx github-label-sync
          --access-token '${{ secrets.GH_PAT }}'
          --labels 'labels.yaml'
          --allow-added-labels
          '${{ env.REPOSITORY }}'

  repo:
    name: Repo
    runs-on: ubuntu-latest
    steps:
      - name: Edit Repository Settings
        run: >-
          gh repo edit '${{ env.REPOSITORY }}'
          --allow-update-branch
          --delete-branch-on-merge
          --enable-auto-merge
          --enable-discussions
          --enable-issues
          --enable-merge-commit=false
          --enable-projects=false
          --enable-rebase-merge=false
          --enable-secret-scanning
          --enable-secret-scanning-push-protection
          --enable-squash-merge
          --enable-wiki=false
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  ruleset:
    name: Ruleset
    runs-on: ubuntu-latest
    steps:
      - name: Ruleset Import
        # TODO: switch to gh cli until <https://github.com/cli/cli/issues/8019> is resolved
        uses: liblaf/actions/ruleset-import@v1
        with:
          name: main
          source-repository: ${{ env.OWNER }}/.github
          target-repository: ${{ env.REPOSITORY }}
          token: ${{ secrets.GH_PAT }}
