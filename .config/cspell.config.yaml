ignoreRandomStrings: true
maxFileSize: 500KB
useGitignore: true
words:
  - adel
  - bunup
  - chanfana
  - direnv
  - dotenv
  - liblaf
  - muhandes
  - nuxt
  - pipx
  - smee
  - uuidgen
